name: Ensure Frontmatter

on:
  pull_request:
  branches:
    - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.13

      - name: Ensure frontmatter
        shell: bash
        run: ./ensure_frontmatter.py
        working-directory: scripts
